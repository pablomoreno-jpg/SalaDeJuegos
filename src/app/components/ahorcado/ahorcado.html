<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg p-4">

            <div class="row align-items-center">

                <div class="col-md-5 text-center">

                    <img [src]="'assets/ahorcado/' + errores + '.png'" class="img-fluid w-50 -mb-3" alt="ahorcado">

                    <p class="mt-3">
                        Errores:
                        <span class="badge bg-danger">
                            {{errores}} / {{maxErrors}}
                        </span>
                    </p>


                </div>


                <div class="col-md-7">


                    <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">

                        @for(letra of letrasDePalabraElegida; track $index){

                        <div class="letter-box">
                            {{letra}}
                        </div>

                        }

                    </div>


                    <div class="d-flex flex-wrap justify-content-center gap-2">

                        @for(letra of abecedario.split(''); track letra){

                        <button class="btn btn-primary keyboard-btn"
                            [disabled]="letrasUsuadas.includes(letra) || juegoTerminado" (click)="adivinarLetra(letra)">

                            {{letra}}

                        </button>

                        }

                    </div>

                    @if(juegoTerminado){

                    <div class="alert mt-4 text-center" [ngClass]="ganador ? 'alert-success' : 'alert-danger'">

                        @if(ganador){
                        <span>Ganaste</span>
                        } @else {
                        <span>Perdiste</span>
                        }

                    </div>

                    <div class="text-center mt-4">

                        <button class="btn btn-warning" (click)="iniciarJuego()">

                            Jugar otra vez

                        </button>

                    </div>

                    }

                </div>

            </div>

        </div>

    </div>

</div>
